<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library Admin - Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="admin-style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div id="adminLoginOverlay">
    <div class="login-card shadow-lg">
        <img src="NEU.png" width="100" class="mb-3 logo-animate">
        <h3 class="fw-bold text-dark">Library Admin</h3>
        <p class="text-muted mb-4">Authorized Personnel Only</p>
        
        <button class="btn btn-primary w-100 py-3 fw-bold mb-3" onclick="handleGoogleLogin()">
            <i class="bi bi-google me-2"></i> Sign in with Google
        </button>

        <a href="index.html" class="text-decoration-none small text-secondary">
            <i class="bi bi-arrow-left me-1"></i> Back to Visitor Entry
        </a>
    </div>
</div>

<div id="dashboardContent" class="d-none">
    <div class="sidebar">
        <div class="p-4 mb-3 border-bottom text-center">
            <img src="NEU.png" width="60" class="mb-2">
            <h5 class="fw-bold text-primary mb-0">NEU Library</h5>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link active" id="nav-dashboard" onclick="switchTab('dashboard')"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a class="nav-link" id="nav-logs" onclick="switchTab('logs')"><i class="bi bi-clock-history me-2"></i> Visitor Log</a>
            <hr class="mx-3">
            <a class="nav-link text-danger" onclick="handleLogout()"><i class="bi bi-power me-2"></i> Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div id="tab-dashboard" class="tab-pane">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Library Dashboard</h2>
                <div class="text-end">
                    <span id="adminEmailDisplay" class="badge bg-light text-dark p-2 border"></span>
                </div>
            </div>
            
            <div class="filter-container">
                <div class="filter-group mb-3">
                    <span class="fw-bold small text-muted text-uppercase">Time Range:</span>
                    <button class="btn btn-sm btn-outline-primary active date-btn" onclick="setFilter('today', this)">Today</button>
                    <button class="btn btn-sm btn-outline-primary date-btn" onclick="setFilter('week', this)">This Week</button>
                    <input type="date" id="date-start" class="form-control form-control-sm w-auto">
                    <span>to</span>
                    <input type="date" id="date-end" class="form-control form-control-sm w-auto">
                </div>
                <hr>
                <div class="filter-group">
                    <span class="fw-bold small text-muted text-uppercase">Data Filter:</span>
                    <select id="filter-purpose" class="form-select form-select-sm w-auto border-0 bg-light">
                        <option value="all">All Purposes</option>
                        <option value="Reading">Reading / Study</option>
                        <option value="Researching">Researching</option>
                        <option value="Use of Computer">Use of Computer</option>
                        <option value="Meeting">Meeting / Consultation</option>
                        <option value="Borrow/Return">Borrow/Return Book</option>
                    </select>
                    
                    <select id="filter-college" class="form-select form-select-sm w-auto border-0 bg-light">
                        <option value="all">All Colleges</option>
                        <option value="COA">COA</option>
                        <option value="CAgri">CAgri</option>
                        <option value="CAS">CAS</option>
                        <option value="CBA">CBA</option>
                        <option value="COC">COC</option>
                        <option value="CICS">CICS</option>
                        <option value="CCRIM">CCRIM</option>
                        <option value="CED">CED</option>
                        <option value="CEA">CEA</option>
                        <option value="N/A">N/A (Staff/Faculty)</option>
                    </select>

                    <select id="filter-type" class="form-select form-select-sm w-auto border-0 bg-light">
                        <option value="all">All Types</option>
                        <option value="Student">Student</option>
                        <option value="Faculty">Faculty</option>
                    </select>
                    <button class="btn btn-sm btn-dark px-4 ms-auto rounded-pill" onclick="applyFilters()">Apply Selection</button>
                </div>
            </div>

            <div class="row g-4 mb-5">
                <div class="col-md-4"><div class="stat-card border-start border-primary border-5">
                    <small class="text-muted fw-bold">TOTAL VISITS</small><h2 id="stat-total" class="fw-bold">0</h2>
                </div></div>
                <div class="col-md-4"><div class="stat-card border-start border-success border-5">
                    <small class="text-muted fw-bold">STUDENTS</small><h2 id="stat-students" class="fw-bold text-success">0</h2>
                </div></div>
                <div class="col-md-4"><div class="stat-card border-start border-danger border-5">
                    <small class="text-muted fw-bold">EMPLOYEES</small><h2 id="stat-employees" class="fw-bold text-danger">0</h2>
                </div></div>
            </div>

            <h5 class="fw-bold mb-3"><i class="bi bi-folder2-open me-2"></i>Records by Program</h5>
            <div class="row g-3" id="records-grid"></div>
        </div>

        <div id="tab-logs" class="tab-pane d-none">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">Visitor Log</h2>
                <div class="d-flex gap-2 w-50 justify-content-end">
                    <button class="btn btn-success rounded-3 px-3" onclick="exportToCSV()">
                        <i class="bi bi-filetype-csv me-1"></i> Export CSV
                    </button>
                    <div class="input-group w-50">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" id="search-log" class="form-control border-start-0" placeholder="Search logs..." onkeyup="searchLogs()">
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm p-4 bg-white rounded-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>College</th>
                                <th>Program</th>
                                <th>Type</th> <th>Purpose</th>
                                <th>Date & Time</th>
                                <th>Status</th>
                                <th class="text-end">Action</th>
                            </tr>
                        </thead>
                        <tbody id="logTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="admin-script.js"></script>
</body>
</html>
