<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library - Visitor Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            position: relative;
            overflow: hidden; 
        }
        
      
        body::before {
            content: "";
            position: fixed;
           
            top: -20px; left: -20px; right: -20px; bottom: -20px; 
            background: url('newera.jpg') no-repeat center center; 
            background-size: cover;
            filter: blur(10px);
            z-index: -1;
        }

        .login-card { 
            width: 100%; 
            max-width: 500px; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            background: rgba(255, 255, 255, 0.95); 
            border-top: 8px solid #004a99; 
            text-align: center; 
        }
        
        .welcome-box { animation: scaleIn 0.5s ease; }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .student-name { font-size: 1.8rem; font-weight: 800; color: #004a99; margin-top: 10px; }
        .student-program { font-size: 1.2rem; color: #6c757d; font-weight: 500; }
        .welcome-text { font-size: 1.5rem; font-weight: 600; color: #212529; margin-top: 15px; }
        .loading-spinner { width: 1rem; height: 1rem; border-width: 0.2em; }
        
        /* Google Button Style */
        .google-btn {
            background: white; color: #444; border: 1px solid #dadce0;
            padding: 12px 20px; border-radius: 8px; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; transition: 0.2s; width: 100%; cursor: pointer;
            margin-top: 15px;
        }
        .google-btn:hover { background: #f1f3f4; border-color: #d2d2d2; }
    </style>
</head>
<body>

<div class="login-card">
    <div id="headerSection">
        <img src="NEU.png" alt="NEU Logo" width="80" class="mb-3">
        
        <h2 class="fw-bold">NEU LIBRARY</h2>
        <p class="text-muted">Digital Visitor Logbook</p>
        <hr>
    </div>

    <div id="step1">
        <p class="text-muted small mb-3">Please sign in with your institutional account to continue.</p>
        
        <div id="errorMsg" class="alert alert-danger py-2 small d-none">
            <i class="bi bi-exclamation-circle"></i> <span id="errorText">Use your @neu.edu.ph email.</span>
        </div>

        <button class="google-btn" onclick="handleGoogleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Sign in with Google
        </button>

        <div class="text-center mt-4">
            <a href="admin.html" class="text-muted text-decoration-none small" style="opacity: 0.7;">
                <i class="bi bi-shield-lock-fill"></i> Admin Portal
            </a>
        </div>
    </div>

    <div id="step2" class="d-none text-start">
        <div class="mb-3 text-center">
            <p class="text-muted mb-1">Authenticated as:</p>
            <h5 id="displayEmail" class="fw-bold text-primary"></h5>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-bold">College</label>
            <select id="collegeSelect" class="form-select form-select-lg" onchange="updatePrograms()">
                <option value="" disabled selected>Select your College</option>
                <option value="COA">College of Accountancy</option>
                <option value="CAgri">College of Agriculture</option>
                <option value="CAS">College of Arts and Sciences</option>
                <option value="CBA">College of Business Administration</option>
                <option value="COC">College of Communication</option>
                <option value="CICS">College of Informatics and Computing Studies</option>
                <option value="CCRIM">College of Criminology</option>
                <option value="CED">College of Education</option>
                <option value="CEA">College of Engineering and Architecture</option>
                <option value="N/A">N/A (Staff/Faculty)</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Program / Position</label>
            <select id="programSelect" class="form-select form-select-lg">
                <option value="" disabled selected>Select College first...</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Reason for Visit</label>
            <select id="reason" class="form-select form-select-lg">
                <option value="Reading">Reading / Study</option>
                <option value="Researching">Researching</option>
                <option value="Use of Computer">Use of Computer</option>
                <option value="Meeting">Meeting / Consultation</option>
                <option value="Borrow/Return">Borrow/Return Book</option>
            </select>
        </div>
        <button id="confirmBtn" class="btn btn-success btn-lg w-100 fw-bold" onclick="submitLog()">Confirm Entry</button>
        <button class="btn btn-link w-100 text-muted mt-2 btn-sm" onclick="handleLogout()">Sign Out / Cancel</button>
    </div>

    <div id="welcomeMsg" class="d-none welcome-box">
        <i class="bi bi-check-circle-fill text-success" style="font-size: 4.5rem;"></i>
        <div class="student-name" id="finalName">NAME HERE</div>
        <div class="student-program" id="finalProgram">PROGRAM HERE</div>
        <div class="welcome-text">Welcome to NEU Library!</div>
        <div class="mt-4 py-2 px-3 bg-light rounded-pill d-inline-block">
            <small class="text-muted"><i class="bi bi-clock"></i> Entry Logged Successfully</small>
        </div>
        <p class="mt-4 text-muted small">Please proceed. Screen will reset in 5s...</p>
    </div>
</div>

</body>
</html>

<script>
    const supabaseUrl = 'https://vevljhibxlwyyqlyoszu.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZldmxqaGlieGx3eXlxbHlvc3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzI0MzgsImV4cCI6MjA4ODk0ODQzOH0.S27ShJXfZQHZoIzB3JhdnUBS8IE3rS90Kr6yjGFBa_k';
    const _db = supabase.createClient(supabaseUrl, supabaseKey);

    let globalEmail = "";
    let autoFoundName = "";

    // MAPPING NG COLLEGES AT PROGRAMS
    const collegeProgramsMap = {
        "COA": ["BS Accountancy", "BS Accounting Information System"],
        "CAgri": ["BS Agriculture"],
        "CAS": ["BA Economics", "BA Political Science", "BS Biology", "BS Psychology", "Bachelor of Public Administration"],
        "CBA": ["BSBA Financial Management", "BSBA Human Resource Development", "BSBA Legal Management", "BSBA Marketing Management", "BS Entrepreneurship", "BS Real Estate Management"],
        "COC": ["BA Broadcasting", "BA Communication", "BA Journalism"],
        "CICS": ["BS Computer Science", "BS Information Technology", "BS Information System", "BS Entertainment & Multimedia Computing", "Bachelor of Library & Information Science"],
        "CCRIM": ["BS Criminology"],
        "CED": ["BEED", "BSED (English, Math, Science, Filipino, etc.)"],
        "CEA": ["BS Civil Engineering", "BS Electrical Engineering", "BS Mechanical Engineering", "BS Industrial Engineering", "BS Electronics Engineering", "BS Architecture", "BS Astronomy"],
        "N/A": ["Faculty Member", "Staff", "Other"]
    };

    // FUNCTION PARA MAG-UPDATE NG PROGRAM DROPDOWN
    function updatePrograms() {
        const college = document.getElementById('collegeSelect').value;
        const programSelect = document.getElementById('programSelect');
        
        programSelect.innerHTML = ''; // Linisin muna ang lumang options

        if (college && collegeProgramsMap[college]) {
            collegeProgramsMap[college].forEach(program => {
                let opt = document.createElement('option');
                opt.value = program;
                opt.innerHTML = program;
                programSelect.appendChild(opt);
            });
        } else {
            programSelect.innerHTML = '<option value="" disabled selected>Select College first...</option>';
        }
    }

    // --- GOOGLE AUTH LOGIC ---

    async function handleGoogleLogin() {
        const { error } = await _db.auth.signInWithOAuth({
            provider: 'google',
            options: {
                queryParams: { prompt: 'select_account' },
                redirectTo: window.location.origin + window.location.pathname
            }
        });
        if (error) alert(error.message);
    }

    async function handleLogout() {
        await _db.auth.signOut();
        location.reload();
    }

    // Check session on load
    window.onload = async () => {
        const { data: { session } } = await _db.auth.getSession();
        
        if (session) {
            const userEmail = session.user.email;

            // RESTRICTION: Check if it's an NEU email
            if (userEmail.endsWith("@neu.edu.ph")) {
                
                // CHECK KUNG NAKA-BLOCK ANG USER
                const { data: blockedData, error: blockError } = await _db
                    .from('visitor_logs')
                    .select('status')
                    .eq('email', userEmail)
                    .eq('status', 'blocked')
                    .limit(1);

                if (blockedData && blockedData.length > 0) {
                    // BLOCKED ANG USER: Show error at i-kick out
                    const errorMsg = document.getElementById('errorMsg');
                    const errorText = document.getElementById('errorText');
                    errorText.innerText = "Access Denied: Your account has been blocked by the Library Admin.";
                    errorMsg.classList.remove('d-none');
                    await _db.auth.signOut();
                    return; // Wag na ituloy pababa
                }

               
                globalEmail = userEmail;
                autoFoundName = session.user.user_metadata.full_name || "Visitor";
                setupStep2();
            } else {
                
                const errorMsg = document.getElementById('errorMsg');
                const errorText = document.getElementById('errorText');
                errorText.innerText = "Access Denied: Please use your @neu.edu.ph account.";
                errorMsg.classList.remove('d-none');
                await _db.auth.signOut();
            }
        }
    };

    function setupStep2() {
        document.getElementById('step1').classList.add('d-none');
        document.getElementById('step2').classList.remove('d-none');
        document.getElementById('displayEmail').innerText = globalEmail;
        
        // Auto-detect if Faculty (based on typical EDU naming patterns)
        const hasNumber = /\d/.test(globalEmail.split('@')[0]);
        if (!hasNumber) {
            document.getElementById('collegeSelect').value = "N/A";
            updatePrograms(); // I-trigger ang pag-update ng program dropdown
            document.getElementById('programSelect').value = "Faculty Member"; 
        }
    }

    async function submitLog() {
        const confirmBtn = document.getElementById('confirmBtn');
        const selectedCollege = document.getElementById('collegeSelect').value; 
        const selectedProgram = document.getElementById('programSelect').value; 
        const selectedReason = document.getElementById('reason').value;

        // Validation bago i-submit
        if(!selectedCollege || !selectedProgram) {
            alert("Please select both College and Program.");
            return;
        }

        confirmBtn.innerHTML = `<span class="spinner-border loading-spinner"></span> Saving...`;
        confirmBtn.disabled = true;

        try {
            const { error } = await _db.from('visitor_logs').insert([{ 
                full_name: autoFoundName, 
                email: globalEmail, 
                college: selectedCollege,  
                program: selectedProgram, 
                reason: selectedReason
                
            }]);

            if (error) throw error;

            // Show Success UI
            document.getElementById('finalName').innerText = autoFoundName.toUpperCase();
            document.getElementById('finalProgram').innerText = selectedCollege === "N/A" ? selectedProgram : `${selectedCollege} - ${selectedProgram}`;
            document.getElementById('headerSection').classList.add('d-none');
            document.getElementById('step2').classList.add('d-none');
            document.getElementById('welcomeMsg').classList.remove('d-none');
            
            // Auto Sign Out and Reset after 5 seconds
            setTimeout(async () => { 
                await _db.auth.signOut();
                location.reload(); 
            }, 5000);

        } catch (err) {
            alert("Error saving your visit. Please inform the librarian.");
            console.error(err);
            confirmBtn.innerText = "Confirm Entry";
            confirmBtn.disabled = false;
        }
    }
</script>
</body>
</html>
