<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library - Visitor Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .login-card { width: 100%; max-width: 500px; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); background: white; border-top: 8px solid #004a99; text-align: center; }
        .welcome-box { animation: scaleIn 0.5s ease; }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .student-name { font-size: 1.8rem; font-weight: 800; color: #004a99; margin-top: 10px; }
        .student-program { font-size: 1.2rem; color: #6c757d; font-weight: 500; }
        .welcome-text { font-size: 1.5rem; font-weight: 600; color: #212529; margin-top: 15px; }
        .loading-spinner { width: 1rem; height: 1rem; border-width: 0.2em; }
    </style>
</head>
<body>

<div class="login-card">
    <div id="headerSection">
        <h2 class="fw-bold">NEU LIBRARY</h2>
        <p class="text-muted">Digital Visitor Logbook</p>
        <hr>
    </div>

    <div id="step1" class="text-start">
        <div class="mb-3">
            <label class="form-label fw-bold">Institutional Email</label>
            <input type="email" id="emailInput" class="form-control form-control-lg" placeholder="Enter your Email">
            <div id="errorMsg" class="text-danger small mt-2 d-none">
                <i class="bi bi-exclamation-circle"></i> <span id="errorText">Use your @neu.edu.ph email.</span>
            </div>
        </div>
        <button id="nextBtn" class="btn btn-primary btn-lg w-100 fw-bold" onclick="validateEmail()">
            Next <i class="bi bi-arrow-right"></i>
        </button>
        
        <div class="text-center mt-3">
            <a href="admin.html" class="text-muted text-decoration-none small" style="opacity: 0.7;">
                <i class="bi bi-shield-lock-fill"></i> Admin Login
            </a>
        </div>
    </div>

    <div id="step2" class="d-none text-start">
        <div class="mb-3 text-center">
            <p class="text-muted mb-1">Welcome back,</p>
            <h5 id="displayEmail" class="fw-bold text-primary"></h5>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-bold">Program / Position</label>
            <select id="programSelect" class="form-select form-select-lg">
                <optgroup label="Students">
                    <option value="BSIT">BSIT</option>
                    <option value="BSIS">BSIS</option>
                    <option value="BSEMC">BSEMC</option>
                    <option value="BSCS">BSCS</option>
                    <option value="OTHER">Other Student</option>
                </optgroup>
                <optgroup label="Faculty & Staff">
                    <option value="FACULTY">Faculty Member</option>
                    <option value="STAFF">Staff</option>
                </optgroup>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Reason for Visit</label>
            <select id="reason" class="form-select form-select-lg">
                <option value="Reading">Reading / Study</option>
                <option value="Researching">Researching</option>
                <option value="Use of Computer">Use of Computer</option>
                <option value="Meeting">Meeting / Consultation</option>
                <option value="Borrow/Return">Borrow/Return Book</option>
            </select>
        </div>
        <button id="confirmBtn" class="btn btn-success btn-lg w-100 fw-bold" onclick="submitLog()">Confirm Entry</button>
        <button class="btn btn-link w-100 text-muted mt-2 btn-sm" onclick="location.reload()">Cancel</button>
    </div>

    <div id="welcomeMsg" class="d-none welcome-box">
        <i class="bi bi-check-circle-fill text-success" style="font-size: 4.5rem;"></i>
        <div class="student-name" id="finalName">NAME HERE</div>
        <div class="student-program" id="finalProgram">PROGRAM HERE</div>
        <div class="welcome-text">"Welcome to NEU Library!"</div>
        <div class="mt-4 py-2 px-3 bg-light rounded-pill d-inline-block">
            <small class="text-muted"><i class="bi bi-clock"></i> Entry Logged Successfully</small>
        </div>
        <p class="mt-4 text-muted small">Please proceed. Screen will reset in 5s...</p>
    </div>
</div>

<script>
    const supabaseUrl = 'https://vevljhibxlwyyqlyoszu.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZldmxqaGlieGx3eXlxbHlvc3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzI0MzgsImV4cCI6MjA4ODk0ODQzOH0.S27ShJXfZQHZoIzB3JhdnUBS8IE3rS90Kr6yjGFBa_k';
    const _db = supabase.createClient(supabaseUrl, supabaseKey);

    let globalEmail = "";
    let autoFoundName = "";

    async function validateEmail() {
        const nextBtn = document.getElementById('nextBtn');
        const emailInput = document.getElementById('emailInput');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');

        globalEmail = emailInput.value.trim().toLowerCase();
        errorMsg.classList.add('d-none');

        // Basic Domain Check
        if (!globalEmail.endsWith("@neu.edu.ph")) {
            errorText.innerText = "Please use your NEU email (@neu.edu.ph).";
            errorMsg.classList.remove('d-none');
            return;
        }

        nextBtn.innerHTML = `<span class="spinner-border loading-spinner"></span> Checking...`;
        nextBtn.disabled = true;

        try {
            
            const { data, error } = await _db
                .from('visitor_logs')
                .select('full_name, program, is_blocked')
                .eq('email', globalEmail)
                .order('created_at', { ascending: false })
                .limit(1);

            if (data && data.length > 0) {
                const user = data[0];
                
                // 1. Check if Blocked
                if (user.is_blocked) {
                    errorText.innerText = "Access Denied. Your account is currently blocked.";
                    errorMsg.classList.remove('d-none');
                    nextBtn.innerHTML = `Next <i class="bi bi-arrow-right"></i>`;
                    nextBtn.disabled = false;
                    return;
                }

                // 2. Auto-fill program if found
                document.getElementById('programSelect').value = user.program;
                autoFoundName = user.full_name;
            } else {
                // New user logic (parse name from email)
                const namePart = globalEmail.split('@')[0].split('.');
                autoFoundName = namePart.map(n => n.charAt(0).toUpperCase() + n.slice(1)).join(' ');
                
                // Auto-detect if Faculty (usually no numbers in email)
                const hasNumber = /\d/.test(globalEmail.split('@')[0]);
                if (!hasNumber) document.getElementById('programSelect').value = "FACULTY";
            }

            // Proceed to Step 2
            document.getElementById('step1').classList.add('d-none');
            document.getElementById('step2').classList.remove('d-none');
            document.getElementById('displayEmail').innerText = globalEmail;

        } catch (err) {
            console.error("Database error:", err);
            errorText.innerText = "Connection error. Please try again.";
            errorMsg.classList.remove('d-none');
        } finally {
            nextBtn.innerHTML = `Next <i class="bi bi-arrow-right"></i>`;
            nextBtn.disabled = false;
        }
    }

    async function submitLog() {
        const confirmBtn = document.getElementById('confirmBtn');
        const selectedProgram = document.getElementById('programSelect').value; 
        const selectedReason = document.getElementById('reason').value;

        confirmBtn.innerHTML = `<span class="spinner-border loading-spinner"></span> Saving...`;
        confirmBtn.disabled = true;

        try {
            const { error } = await _db.from('visitor_logs').insert([{ 
                full_name: autoFoundName, 
                email: globalEmail, 
                program: selectedProgram, 
                reason: selectedReason,
                is_blocked: false // Default for new entries
            }]);

            if (error) throw error;

            // Show Success UI
            document.getElementById('finalName').innerText = autoFoundName.toUpperCase();
            document.getElementById('finalProgram').innerText = selectedProgram; 
            document.getElementById('headerSection').classList.add('d-none');
            document.getElementById('step2').classList.add('d-none');
            document.getElementById('welcomeMsg').classList.remove('d-none');
            
            // Auto Reset
            setTimeout(() => { location.reload(); }, 5000);

        } catch (err) {
            alert("Error saving your visit. Please inform the librarian.");
            console.error(err);
            confirmBtn.innerText = "Confirm Entry";
            confirmBtn.disabled = false;
        }
    }
</script>
</body>
</html>
